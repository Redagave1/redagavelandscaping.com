<script>
/* LOADER */
(function(){function h(){var l=document.getElementById("loader");if(l)l.classList.add("done");}window.addEventListener("load",function(){setTimeout(h,400);});setTimeout(h,2000);})();

/* CURSOR */
(function(){
  const c=document.getElementById("cur"),r=document.getElementById("cur-ring");
  if(!c||!r)return;
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener("mousemove",e=>{mx=e.clientX;my=e.clientY;c.style.left=mx+"px";c.style.top=my+"px"});
  (function a(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;r.style.left=rx+"px";r.style.top=ry+"px";requestAnimationFrame(a)})();
  document.querySelectorAll("a,button").forEach(el=>{
    el.addEventListener("mouseenter",()=>{c.style.width="18px";c.style.height="18px";c.style.background="var(--gold-light)"});
    el.addEventListener("mouseleave",()=>{c.style.width="10px";c.style.height="10px";c.style.background="var(--gold)"});
  });
})();

/* NAV */
const nav=document.getElementById("nav");
window.addEventListener("scroll",()=>nav.classList.toggle("scrolled",scrollY>60),{passive:true});
document.getElementById("nav-quote-btn")?.addEventListener("click",()=>location.href="contact.html");

/* MOBILE MENU */
const hbg=document.getElementById("hbg"),mob=document.getElementById("mob-menu");
hbg?.addEventListener("click",()=>{
  mob.classList.toggle("open");
  const s=hbg.querySelectorAll("span");
  if(mob.classList.contains("open")){s[0].style.transform="rotate(45deg) translate(5px,5px)";s[1].style.opacity="0";s[2].style.transform="rotate(-45deg) translate(5px,-5px)"}
  else{s.forEach(x=>{x.style.transform="";x.style.opacity=""})}
});
mob?.querySelectorAll("a").forEach(a=>a.addEventListener("click",()=>mob.classList.remove("open")));

/* HERO SLIDESHOW: 6 slides, 3500ms */
(function(){
  const slides=document.querySelectorAll(".hslide");
  const dots=document.querySelectorAll(".hsdot");
  let cur=0,timer;
  function go(n){
    slides[cur].classList.remove("active");dots[cur].classList.remove("active");
    cur=(n+slides.length)%slides.length;
    slides[cur].classList.add("active");dots[cur].classList.add("active");
  }
  dots.forEach(d=>d.addEventListener("click",()=>{go(+d.dataset.idx);clearInterval(timer);timer=setInterval(()=>go(cur+1),3500)}));
  timer=setInterval(()=>go(cur+1),3500);
})();

/* DIFFERENCE PHOTO ROTATION */
(function(){
  const photos=document.querySelectorAll("#difference .diff-photo");
  const ddots=document.querySelectorAll("#diff-dots-r .ddot");
  const caps=["Fire & Water","Custom Decks","Xeriscape Design","Outdoor Living","LED Planters"];
  let c=0;
  setInterval(()=>{
    photos[c].classList.remove("active");ddots[c].classList.remove("active");
    c=(c+1)%photos.length;
    photos[c].classList.add("active");ddots[c].classList.add("active");
    const el=document.getElementById("diff-cap-title");
    if(el)el.textContent=caps[c];
  },4200);
})();

/* SCROLL REVEAL */
(function(){
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add("vis");obs.unobserve(e.target)}});
  },{threshold:.1});
  document.querySelectorAll(".rev,.diff-eyebrow,.diff-big,.diff-item").forEach(el=>obs.observe(el));
})();
</script>

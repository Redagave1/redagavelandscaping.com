<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<title>Before & After — GBP Photo Combiner</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0b0e08;
  --surface: #141810;
  --surface-raised: #1c2117;
  --border: #2a3024;
  --border-active: #c9a84c;
  --gold: #c9a84c;
  --gold-hover: #dbb84e;
  --gold-dim: #7d6930;
  --cream: #f0ead6;
  --muted: #6e7a66;
  --before-accent: #cf6347;
  --after-accent: #5cb85c;
  --error: #cf4747;
  --radius: 6px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica Neue, sans-serif;
  --mono: 'SF Mono', SFMono-Regular, Menlo, Monaco, Consolas, monospace;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg: #f0ede6;
    --surface: #ffffff;
    --surface-raised: #f8f6f0;
    --border: #d0cabb;
    --border-active: #a88220;
    --gold: #a88220;
    --gold-hover: #946e12;
    --gold-dim: #c4a856;
    --cream: #1a1e16;
    --muted: #7a8574;
    --before-accent: #b54530;
    --after-accent: #3d8f2a;
    --error: #b54530;
  }
}

body { font-family: var(--font); background: var(--bg); color: #e8c96a; text-shadow: 0 0 24px rgba(232,196,90,0.45), 0 0 48px rgba(201,168,76,0.18); -webkit-font-smoothing: antialiased; }

.tool { max-width: 720px; margin: 0 auto; padding: 32px 20px 48px; }

.tool-header { margin-bottom: 24px; }
.tool-header h1 {
  font-size: 22px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 4px;
  color: #e8c96a; text-shadow: 0 0 24px rgba(232,196,90,0.45), 0 0 48px rgba(201,168,76,0.18);
}
.tool-header p { font-size: 14px; color: var(--muted); line-height: 1.5; }

.drop-container {
  display: flex; gap: 2px; aspect-ratio: 4 / 3; margin-bottom: 20px;
  border-radius: var(--radius); overflow: hidden; background: var(--gold-dim);
}

.drop-zone {
  flex: 1; position: relative; background: var(--surface); cursor: pointer; overflow: hidden;
  transition: background 0.15s; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
}
.drop-zone:hover { background: var(--surface-raised); }
.drop-zone.dragover { outline: 2px solid var(--border-active); outline-offset: -2px; background: var(--surface-raised); }
.drop-zone.has-image { cursor: default; }

.drop-zone .label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
}
.drop-zone.before .label { color: var(--before-accent); }
.drop-zone.after .label { color: var(--after-accent); }

.drop-zone .icon {
  width: 36px; height: 36px; border: 2px dashed var(--border); border-radius: 4px;
  display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--muted);
}
.drop-zone .hint { font-size: 12px; color: var(--muted); }
.drop-zone input { display: none; }

.drop-zone .preview-img {
  position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
}
.drop-zone .overlay-label {
  position: absolute; top: 10px; left: 10px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 3px 8px; border-radius: 3px;
  background: rgba(0,0,0,0.55); color: #fff; backdrop-filter: blur(4px); z-index: 2;
}
.drop-zone .remove-btn {
  position: absolute; top: 10px; right: 10px; width: 26px; height: 26px;
  border-radius: 50%; border: none; background: rgba(0,0,0,0.5); color: #fff;
  font-size: 16px; cursor: pointer; display: none; align-items: center;
  justify-content: center; backdrop-filter: blur(4px); z-index: 2; line-height: 1;
}
.drop-zone.has-image .remove-btn { display: flex; }
.drop-zone .remove-btn:hover { background: rgba(0,0,0,0.75); }

.settings { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }

.setting-group {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
}
.setting-group h3 {
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
}

.gps-row { display: flex; gap: 12px; align-items: flex-end; }
.gps-field { flex: 1; }
.gps-field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.gps-field input {
  width: 100%; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; color: var(--cream); font-family: var(--mono); font-size: 13px;
  outline: none; transition: border-color 0.15s;
}
.gps-field input:focus { border-color: var(--border-active); }
.gps-field input::placeholder { color: var(--muted); opacity: 0.5; }

.gps-status { font-size: 12px; color: var(--muted); margin-top: 8px; }
.gps-status.found { color: var(--after-accent); }

.options-row { display: flex; align-items: center; gap: 8px; }
.options-row input[type="checkbox"] { accent-color: var(--gold); width: 16px; height: 16px; cursor: pointer; }
.options-row label { font-size: 13px; color: var(--cream); cursor: pointer; user-select: none; }

.preview-section { margin-bottom: 24px; }
.preview-section h3 {
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
}
.preview-wrap {
  border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border);
  background: var(--surface); line-height: 0;
}
.preview-wrap canvas { width: 100%; height: auto; display: block; }

.output-info {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 8px; font-size: 12px; color: var(--muted); font-family: var(--mono);
}

.download-btn {
  width: 100%; padding: 14px 24px; border: none; border-radius: var(--radius);
  background: var(--gold); color: #0b0e08; font-family: var(--font);
  font-size: 15px; font-weight: 700; letter-spacing: 0.02em;
  cursor: pointer; transition: background 0.15s, opacity 0.15s;
}
.download-btn:hover { background: var(--gold-hover); }
.download-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.download-btn:disabled:hover { background: var(--gold); }

.error-msg { font-size: 13px; color: var(--error); margin-top: 8px; text-align: center; min-height: 20px; }

@media (max-width: 480px) {
  .tool { padding: 20px 16px 40px; }
  .gps-row { flex-direction: column; }
  .tool-header h1 { font-size: 19px; }
}
</style>
</head>
<body>

<div class="tool">
  <div class="tool-header">
    <h1>Before &amp; After Combiner</h1>
    <p>Combine two photos into one geotagged side-by-side for Google Business Profile. Drop geotagged photos to auto-fill GPS coordinates.</p>
  </div>

  <div class="drop-container">
    <div class="drop-zone before" id="beforeZone">
      <span class="label">Before</span>
      <div class="icon">+</div>
      <span class="hint">Drop or tap</span>
      <input type="file" accept="image/*" id="beforeInput">
      <span class="overlay-label" style="display:none">BEFORE</span>
      <button class="remove-btn" title="Remove">&times;</button>
    </div>
    <div class="drop-zone after" id="afterZone">
      <span class="label">After</span>
      <div class="icon">+</div>
      <span class="hint">Drop or tap</span>
      <input type="file" accept="image/*" id="afterInput">
      <span class="overlay-label" style="display:none">AFTER</span>
      <button class="remove-btn" title="Remove">&times;</button>
    </div>
  </div>

  <div class="settings">
    <div class="setting-group">
      <h3>Job Site GPS</h3>
      <div class="gps-row">
        <div class="gps-field">
          <label>Latitude</label>
          <input type="text" id="latInput" placeholder="30.2672" inputmode="decimal">
        </div>
        <div class="gps-field">
          <label>Longitude</label>
          <input type="text" id="lonInput" placeholder="-97.7431" inputmode="decimal">
        </div>
      </div>
      <div class="gps-status" id="gpsStatus">Drop a geotagged photo to auto-fill</div>
    </div>

    <div class="setting-group">
      <div class="options-row">
        <input type="checkbox" id="showLabels" checked>
        <label for="showLabels">Show BEFORE / AFTER labels on image</label>
      </div>
    </div>
  </div>

  <div class="preview-section" id="previewSection" style="display:none">
    <h3>Preview</h3>
    <div class="preview-wrap">
      <canvas id="outputCanvas" width="1200" height="900"></canvas>
    </div>
    <div class="output-info">
      <span>1200 &times; 900 px &middot; JPEG</span>
      <span id="fileSizeEst"></span>
    </div>
  </div>

  <button class="download-btn" id="downloadBtn" disabled>Download with Geotag</button>
  <div class="error-msg" id="errorMsg"></div>
</div>

<script>
document.fonts.load('400 36px "Bebas Neue"');
let beforeImg = null, afterImg = null;
const $ = id => document.getElementById(id);
const canvas = $('outputCanvas');
const ctx = canvas.getContext('2d');

['before', 'after'].forEach(side => {
  const zone = $(side + 'Zone');
  const input = $(side + 'Input');

  zone.addEventListener('click', e => {
    if (e.target.closest('.remove-btn')) return;
    if (!zone.classList.contains('has-image')) input.click();
  });

  input.addEventListener('change', () => { if (input.files[0]) handleFile(input.files[0], side); });

  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('dragover');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) handleFile(f, side);
  });

  zone.querySelector('.remove-btn').addEventListener('click', e => { e.stopPropagation(); removeImage(side); });
});

$('showLabels').addEventListener('change', render);
$('latInput').addEventListener('input', updateBtn);
$('lonInput').addEventListener('input', updateBtn);
$('downloadBtn').addEventListener('click', doDownload);

function handleFile(file, side) {
  const reader = new FileReader();
  reader.onload = () => {
    const buf = reader.result;
    const gps = readGPS(buf);
    if (gps) {
      $('latInput').value = gps.lat.toFixed(6);
      $('lonInput').value = gps.lon.toFixed(6);
      $('gpsStatus').textContent = 'Extracted from ' + side.toUpperCase() + ' image';
      $('gpsStatus').className = 'gps-status found';
    }
    const img = new Image();
    img.onload = () => {
      if (side === 'before') beforeImg = img; else afterImg = img;
      showThumb(side, img);
      render();
      updateBtn();
    };
    img.src = URL.createObjectURL(new Blob([buf]));
  };
  reader.readAsArrayBuffer(file);
}

function showThumb(side, img) {
  const zone = $(side + 'Zone');
  zone.classList.add('has-image');
  const old = zone.querySelector('.preview-img');
  if (old) { URL.revokeObjectURL(old.src); old.remove(); }
  const el = document.createElement('img');
  el.className = 'preview-img'; el.src = img.src;
  zone.appendChild(el);
  zone.querySelector('.overlay-label').style.display = '';
  zone.querySelector('.label').style.display = 'none';
  zone.querySelector('.icon').style.display = 'none';
  zone.querySelector('.hint').style.display = 'none';
}

function removeImage(side) {
  const zone = $(side + 'Zone');
  zone.classList.remove('has-image');
  const p = zone.querySelector('.preview-img');
  if (p) { URL.revokeObjectURL(p.src); p.remove(); }
  zone.querySelector('.overlay-label').style.display = 'none';
  zone.querySelector('.label').style.display = '';
  zone.querySelector('.icon').style.display = '';
  zone.querySelector('.hint').style.display = '';
  if (side === 'before') beforeImg = null; else afterImg = null;
  $(side + 'Input').value = '';
  render(); updateBtn();
}

function render() {
  if (!beforeImg && !afterImg) { $('previewSection').style.display = 'none'; return; }
  $('previewSection').style.display = '';
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, 1200, 900);
  if (beforeImg) cover(ctx, beforeImg, 0, 0, 599, 900);
  if (afterImg) cover(ctx, afterImg, 601, 0, 599, 900);
  ctx.fillStyle = '#c9a84c';
  ctx.fillRect(599, 0, 2, 900);
  if ($('showLabels').checked) {
    tag(ctx, 'BEFORE', 20, 856);
    tag(ctx, 'AFTER', 621, 856);
  }
}

function cover(ctx, img, x, y, w, h) {
  const s = Math.max(w / img.naturalWidth, h / img.naturalHeight);
  const sw = w / s, sh = h / s;
  ctx.drawImage(img, (img.naturalWidth - sw) / 2, (img.naturalHeight - sh) / 2, sw, sh, x, y, w, h);
}

function tag(ctx, text, x, y) {
  ctx.save();
  ctx.font = '400 36px "Bebas Neue", "Oswald", "Impact", sans-serif';
  ctx.letterSpacing = '8px';
  ctx.textBaseline = 'alphabetic';
  const tw = ctx.measureText(text).width;
  const tx = x + 24, ty = y + 32;

  // outer soft glow
  ctx.shadowColor = 'rgba(201,168,76,0.5)';
  ctx.shadowBlur = 40;
  ctx.fillStyle = 'rgba(232,201,106,0.01)';
  ctx.fillText(text, tx, ty);

  // mid glow
  ctx.shadowColor = 'rgba(232,196,90,0.6)';
  ctx.shadowBlur = 18;
  ctx.fillStyle = '#e8c96a';
  ctx.fillText(text, tx, ty);

  // crisp gold on top — no shadow
  ctx.shadowColor = 'transparent';
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#f0d878';
  ctx.fillText(text, tx, ty);

  ctx.restore();
}

function updateBtn() {
  const ok = beforeImg && afterImg;
  const lat = parseFloat($('latInput').value);
  const lon = parseFloat($('lonInput').value);
  const gpsOk = !isNaN(lat) && !isNaN(lon) && Math.abs(lat) <= 90 && Math.abs(lon) <= 180;
  $('downloadBtn').disabled = !(ok && gpsOk);
  $('errorMsg').textContent = ok && !gpsOk ? 'Enter valid GPS coordinates to download' : '';
}

/* ── EXIF GPS Reader ── */
function readGPS(buf) {
  try {
    const v = new DataView(buf);
    if (v.getUint16(0) !== 0xFFD8) return null;
    let p = 2;
    while (p < buf.byteLength - 4) {
      const m = v.getUint16(p);
      if ((m & 0xFF00) !== 0xFF00 || m === 0xFFDA) break;
      if (m === 0xFFE1 && v.getUint32(p + 4) === 0x45786966 && v.getUint16(p + 8) === 0) {
        return tiffGPS(buf, p + 10);
      }
      p += 2 + v.getUint16(p + 2);
    }
  } catch (e) {}
  return null;
}

function tiffGPS(buf, ts) {
  const v = new DataView(buf);
  const le = v.getUint16(ts) === 0x4949;
  const r16 = o => v.getUint16(ts + o, le);
  const r32 = o => v.getUint32(ts + o, le);
  if (r16(2) !== 42) return null;
  const ifd = r32(4), n = r16(ifd);
  let go = null;
  for (let i = 0; i < n; i++) { const e = ifd + 2 + i * 12; if (r16(e) === 0x8825) { go = r32(e + 8); break; } }
  if (go === null) return null;
  const gn = r16(go);
  let lr, rr, lo2, ro;
  for (let i = 0; i < gn; i++) {
    const e = go + 2 + i * 12, t = r16(e);
    if (t === 1) lr = String.fromCharCode(v.getUint8(ts + e + 8));
    else if (t === 2) lo2 = r32(e + 8);
    else if (t === 3) rr = String.fromCharCode(v.getUint8(ts + e + 8));
    else if (t === 4) ro = r32(e + 8);
  }
  if (!lr || !rr || lo2 == null || ro == null) return null;
  const rat = o => { const n2 = r32(o), d = r32(o + 4); return d ? n2 / d : 0; };
  let lat = rat(lo2) + rat(lo2 + 8) / 60 + rat(lo2 + 16) / 3600;
  let lon = rat(ro) + rat(ro + 8) / 60 + rat(ro + 16) / 3600;
  if (lr === 'S') lat = -lat;
  if (rr === 'W') lon = -lon;
  return { lat, lon };
}

/* ── EXIF GPS Writer ── */
function buildExif(lat, lon) {
  const la = Math.abs(lat), lo = Math.abs(lon);
  const lR = lat >= 0 ? 0x4E : 0x53, oR = lon >= 0 ? 0x45 : 0x57;
  const dms = v => [Math.floor(v), Math.floor((v - Math.floor(v)) * 60),
    Math.round(((v - Math.floor(v)) * 60 - Math.floor((v - Math.floor(v)) * 60)) * 60 * 10000)];
  const [ld, lm, ls] = dms(la), [od, om, os] = dms(lo);

  const buf = new ArrayBuffer(138), v = new DataView(buf);
  let o = 0;
  const w8 = b => v.setUint8(o++, b);
  const w16 = b => { v.setUint16(o, b); o += 2; };
  const w32 = b => { v.setUint32(o, b); o += 4; };

  w8(0xFF); w8(0xE1); w16(136);
  w8(0x45); w8(0x78); w8(0x69); w8(0x66); w8(0); w8(0);
  w8(0x4D); w8(0x4D); w16(42); w32(8);
  w16(1); w16(0x8825); w16(4); w32(1); w32(26); w32(0);
  w16(4);
  w16(1); w16(2); w32(2); w8(lR); w8(0); w8(0); w8(0);
  w16(2); w16(5); w32(3); w32(80);
  w16(3); w16(2); w32(2); w8(oR); w8(0); w8(0); w8(0);
  w16(4); w16(5); w32(3); w32(104);
  w32(0);
  w32(ld); w32(1); w32(lm); w32(1); w32(ls); w32(10000);
  w32(od); w32(1); w32(om); w32(1); w32(os); w32(10000);
  return buf;
}

async function doDownload() {
  const lat = parseFloat($('latInput').value), lon = parseFloat($('lonInput').value);
  if (!beforeImg || !afterImg || isNaN(lat) || isNaN(lon)) return;

  const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.92));
  const jpeg = new Uint8Array(await blob.arrayBuffer());
  const exif = new Uint8Array(buildExif(lat, lon));

  const out = new Uint8Array(2 + exif.length + jpeg.length - 2);
  out[0] = 0xFF; out[1] = 0xD8;
  out.set(exif, 2);
  out.set(jpeg.subarray(2), 2 + exif.length);

  const a = document.createElement('a');
  a.download = 'before-after-' + new Date().toISOString().slice(0, 10) + '.jpg';
  a.href = URL.createObjectURL(new Blob([out], { type: 'image/jpeg' }));
  a.click();
  URL.revokeObjectURL(a.href);
}
</script>

</body>
</html>
